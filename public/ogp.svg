<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景グラデーション（エメラルドグリーン） -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- サイト名 -->
  <text x="600" y="240" font-family="'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="bold" fill="white" text-anchor="middle">freenavi</text>
  <!-- キャッチコピー -->
  <text x="600" y="340" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" fill="rgba(255,255,255,0.9)" text-anchor="middle">フリーランスの税金・制度、全部わかる</text>
  <!-- URL -->
  <text x="600" y="420" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)" text-anchor="middle">freenavi.toromonja.com</text>
